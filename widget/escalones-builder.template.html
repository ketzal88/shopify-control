<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Armá tu oferta</title>
<style>
/* === CSS real del widget (slot: se rellena con el <style> de worker-escalones.liquid) === */
__RENDER_CSS__

/* === chrome del builder === */
:root { --wb-ink:#2a2a2a; --wb-line:#e3e0da; --wb-bg:#faf9f6; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--wb-ink);
  background:var(--wb-bg); }
.wb-layout { display:grid; grid-template-columns:1fr 380px; gap:0; min-height:100vh; }
.wb-controls { padding:28px 32px; max-width:640px; }
.wb-preview { background:#efece6; padding:32px; display:flex; align-items:flex-start;
  justify-content:center; border-left:1px solid var(--wb-line); position:sticky; top:0; height:100vh; }
.wb-phone { width:340px; background:#fff; border-radius:16px; padding:20px; box-shadow:0 8px 30px rgba(0,0,0,.08); }
h1 { font-size:22px; margin:0 0 4px; }
.wb-sub { color:#777; font-size:13px; margin:0 0 22px; }
.wb-block { margin-bottom:22px; }
.wb-block > label { display:block; font-size:12px; font-weight:600; text-transform:uppercase;
  letter-spacing:.06em; color:#888; margin-bottom:7px; }
select, input[type=text], input[type=number] { font:inherit; padding:9px 10px; border:1.5px solid var(--wb-line);
  border-radius:8px; width:100%; background:#fff; }
.wb-tier { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.wb-tier input[type=number] { width:80px; }
.wb-tier .wb-hi { flex:0 0 auto; }
.wb-tier button { border:0; background:none; cursor:pointer; color:#b00; font-size:18px; line-height:1; }
.wb-add { border:1.5px dashed var(--wb-line); background:#fff; border-radius:8px; padding:8px 12px;
  cursor:pointer; font:inherit; }
.wb-add[disabled] { opacity:.45; cursor:default; }
.wb-err { color:#b00; font-size:12px; min-height:16px; margin-top:6px; }
.wb-colors { display:flex; gap:14px; flex-wrap:wrap; }
.wb-colors label { display:flex; flex-direction:column; align-items:center; font-size:11px; gap:4px; }
input[type=color] { width:44px; height:32px; border:1px solid var(--wb-line); border-radius:6px; padding:0; background:none; }
.wb-out { width:100%; min-height:120px; font-family:ui-monospace,Menlo,monospace; font-size:12px;
  border:1.5px solid var(--wb-line); border-radius:8px; padding:10px; margin-top:10px; }
.wb-cta { background:var(--wb-ink); color:#fff; border:0; border-radius:9px; padding:12px 18px;
  font:inherit; font-weight:600; cursor:pointer; }
.wb-copy { margin-top:8px; }
@media (max-width:820px){ .wb-layout{ grid-template-columns:1fr; } .wb-preview{ position:static; height:auto; border-left:0; border-top:1px solid var(--wb-line);} }
</style>
</head>
<body>
<div class="wb-layout">
  <div class="wb-controls">
    <h1>Armá tu oferta</h1>
    <p class="wb-sub">Elegí el producto, cuántos se llevan y cuánto ahorran, y cómo se ve. Cuando esté listo, copiá el texto y pegámelo en el chat.</p>

    <div class="wb-block">
      <label for="wb-product">Producto</label>
      <select id="wb-product"></select>
    </div>

    <div class="wb-block">
      <label>Escalones</label>
      <div id="wb-tiers"></div>
      <button type="button" class="wb-add" id="wb-add">+ Agregar escalón</button>
      <div class="wb-err" id="wb-err"></div>
    </div>

    <div class="wb-block">
      <label>Colores</label>
      <div class="wb-colors">
        <label>Principal<input type="color" data-style="ink"></label>
        <label>Acento<input type="color" data-style="sage"></label>
        <label>Tono 1<input type="color" data-style="taupe"></label>
        <label>Tono 2<input type="color" data-style="cream"></label>
      </div>
    </div>

    <div class="wb-block">
      <label for="wb-label">Título</label>
      <input type="text" id="wb-label" data-style="label" maxlength="40">
    </div>
    <div class="wb-block">
      <label for="wb-badge">Etiqueta del destacado</label>
      <input type="text" id="wb-badge" data-style="badge" maxlength="40">
    </div>

    <div class="wb-block">
      <button type="button" class="wb-cta" id="wb-emit">Listo — generar el texto</button>
      <textarea class="wb-out" id="wb-out" readonly placeholder="Acá va a aparecer el texto para pegar en el chat…"></textarea>
      <button type="button" class="wb-add wb-copy" id="wb-copy">Copiar</button>
    </div>
  </div>

  <div class="wb-preview">
    <div class="wb-phone">
      <!-- misma estructura que worker-escalones.liquid, para que el preview sea real -->
      <div id="worker-escalones" class="we">
        <div class="we-wrap">
          <p class="we-label">Llevá más y ahorrá</p>
          <div class="we-tiers" data-we-tiers></div>
          <button type="button" class="we-toggle" data-we-toggle hidden></button>
          <div class="we-nudge" data-we-nudge hidden>
            <div class="we-bar"><div class="we-fill" data-we-fill></div></div>
            <div class="we-nudge-txt" data-we-nudge-txt></div>
          </div>
          <p class="we-note" data-we-note hidden></p>
          <button type="button" class="we-cta" data-we-cta disabled>&nbsp;</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- render REAL del widget (slot: worker-render.js) -->
<script>__RENDER_JS__</script>
<!-- lógica del builder (slot: escalones-builder.logic.js) -->
<script>__BUILDER_LOGIC__</script>
<script>
(function () {
  var PRODUCTS = __PRODUCTS_JSON__;   // [{id,title,unitPriceCents,imageUrl,moneyFormat,variants:[{id,title,price,available}]}]
  var CEILING  = __CEILING_JSON__;    // {maxDiscountPct,maxDurationDays,maxTiers,...}
  var W = window.WorkerEscalones, B = window.EscalonesBuilder;
  var DEF = W.DEFAULT_STYLE;

  var tiers = [{ qty: 1, pct: 0 }, { qty: 2, pct: 10, highlight: true }, { qty: 3, pct: 18 }];
  var style = {};                     // solo lo que el cliente cambia respecto del default

  var productSel = document.getElementById('wb-product');
  PRODUCTS.forEach(function (p, i) {
    var o = document.createElement('option'); o.value = i; o.textContent = p.title; productSel.appendChild(o);
  });
  function product() { return PRODUCTS[productSel.value | 0]; }

  // --- editor de escalones (techo enforced) ---
  function renderTierRows() {
    var box = document.getElementById('wb-tiers'); box.textContent = '';
    tiers.forEach(function (t, i) {
      var row = document.createElement('div'); row.className = 'wb-tier';
      var q = document.createElement('input'); q.type = 'number'; q.min = 1; q.value = t.qty;
      q.title = 'unidades'; q.oninput = function () { t.qty = parseInt(q.value, 10); sync(); };
      var pct = document.createElement('input'); pct.type = 'number'; pct.min = 0; pct.max = CEILING.maxDiscountPct;
      pct.value = t.pct; pct.title = '% de ahorro';
      pct.oninput = function () {
        var v = parseInt(pct.value, 10);
        if (!B.tierPctValid(v, CEILING)) { if (v > CEILING.maxDiscountPct) { v = CEILING.maxDiscountPct; pct.value = v; } }
        t.pct = v; sync();
      };
      var hi = document.createElement('input'); hi.type = 'radio'; hi.name = 'wb-hi'; hi.className = 'wb-hi';
      hi.checked = !!t.highlight; hi.title = 'destacado';
      hi.onchange = function () { tiers.forEach(function (x) { x.highlight = false; }); t.highlight = true; sync(); };
      var del = document.createElement('button'); del.textContent = '×'; del.title = 'quitar';
      del.onclick = function () { tiers.splice(i, 1); renderTierRows(); sync(); };
      row.appendChild(q); row.appendChild(document.createTextNode('u ·'));
      row.appendChild(pct); row.appendChild(document.createTextNode('%'));
      row.appendChild(hi); row.appendChild(del);
      box.appendChild(row);
    });
    document.getElementById('wb-add').disabled = !B.canAddTier(tiers, CEILING);
  }
  document.getElementById('wb-add').onclick = function () {
    if (!B.canAddTier(tiers, CEILING)) return;
    var last = tiers[tiers.length - 1] || { qty: 0 };
    tiers.push({ qty: (last.qty || 0) + 1, pct: Math.min(CEILING.maxDiscountPct, (last.pct || 0) + 5) });
    renderTierRows(); sync();
  };

  // --- inputs de estilo ---
  Array.prototype.forEach.call(document.querySelectorAll('[data-style]'), function (inp) {
    var k = inp.getAttribute('data-style');
    inp.value = DEF[k];
    inp.oninput = function () {
      if (inp.value && inp.value !== DEF[k]) style[k] = inp.value; else delete style[k];
      sync();
    };
  });

  // --- preview con el render REAL ---
  var previewRoot = document.getElementById('worker-escalones');
  function sync() {
    var v = B.tiersValid(tiers, CEILING);
    document.getElementById('wb-err').textContent = v.ok ? '' : v.reason;
    if (!v.ok) return;
    var p = product();
    delete previewRoot.dataset.weReady;
    W.render(previewRoot, {
      deal: { tiers: tiers, strategy: 'automatic' },
      variants: p.variants || [],
      cfg: { unitPriceCents: p.unitPriceCents, moneyFormat: p.moneyFormat, imageUrl: p.imageUrl },
      style: style
    });
  }
  productSel.onchange = sync;

  // --- salida ---
  document.getElementById('wb-emit').onclick = function () {
    var v = B.tiersValid(tiers, CEILING);
    if (!v.ok) { document.getElementById('wb-err').textContent = v.reason; return; }
    var p = product();
    document.getElementById('wb-out').value = B.emitConfig({
      product: { id: p.id, title: p.title }, tiers: tiers, style: style
    });
  };
  document.getElementById('wb-copy').onclick = function () {
    var out = document.getElementById('wb-out'); out.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out.value);
  };

  renderTierRows();
  sync();
})();
</script>
</body>
</html>
